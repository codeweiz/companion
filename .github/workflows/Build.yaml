name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test_and_build:
    name: Local checks and build outputs
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle && cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: yes

      - name: Check build-logic
        run: ./gradlew :build-logic:convention:check

      - name: Check spotless
        run: ./gradlew spotlessCheck

      - name: Check Dependency Guard
        id: dependencyguard_verify
        continue-on-error: true
        run: ./gradlew dependencyGuard

      - name: Prevent updating Dependency Guard baselines if this is a fork
        if: steps.dependencyguard_verify.outcome == 'failure' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::Dependency Guard failed, please update baselines with: ./gradlew dependencyGuardBaseline"
          exit 1

      - name: Generate new Dependency Guard baselines if verification failed and it is a PR
        id: dependencyguard_baseline
        if: steps.dependencyguard_verify.outcome == 'failure' && github.event_name == 'pull_request'
        run: ./gradlew dependencyGuardBaseline

      - name: Push new Dependency Guard baselines if available
        if: steps.dependencyguard_baseline.outcome == 'success'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: '**/dependencies/*.txt'
          disable_globbing: true
          commit_message: 'ci: update Dependency Guard baselines'

      - name: Update Graphs
        run: ./gradlew graphUpdate
        continue-on-error: true

      - name: Check Graphs
        id: graphs_verify
        run: git add -- "**/README.md" && git diff --cached --quiet --exit-code -- "**/README.md"

      - name: Prevent updating graphs if this is a fork
        if: steps.graphs_verify.outcome == 'failure' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::Check Graphs failed, please update graphs with: ./gradlew graphUpdate"
          exit 1

      - name: Push new graphs if available
        if: steps.graphs_verify.outcome == 'failure' && github.event_name == 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: '**/README.md'
          disable_globbing: true
          commit_message: 'ci: update module graphs'

      - name: Run screenshot tests
        run: ./gradlew verifyRoborazziDemoDebug

      - name: Run local tests
        run: ./gradlew testDemoDebugUnitTest :lint:test

      - name: Build app variants
        run: ./gradlew :app:assemble -PminifyWithR8=false

      - name: Check lint
        run: ./gradlew :app:lintDemoDebug :app:lintProdRelease :lint:lint

      - name: Check badging
        run: ./gradlew :app:checkProdReleaseBadging

      - name: Upload build outputs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: apks
          path: '**/build/outputs/apk/**/*.apk'

      - name: Upload JVM local results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: local-test-results
          path: '**/build/test-results/test*UnitTest/**.xml'

      - name: Upload screenshot diffs
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-test-results
          path: '**/build/outputs/roborazzi/*_compare.png'

      - name: Upload lint reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: '**/build/reports/lint-results-*.html'

      - name: Upload lint SARIF for demoDebug app
        if: ${{ !cancelled() && hashFiles('app/build/reports/lint-results-demoDebug.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/lint-results-demoDebug.sarif
          category: app-demoDebug

      - name: Upload lint SARIF for prodRelease app
        if: ${{ !cancelled() && hashFiles('app/build/reports/lint-results-prodRelease.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: app/build/reports/lint-results-prodRelease.sarif
          category: app-prodRelease

      - name: Upload lint SARIF for lint module
        if: ${{ !cancelled() && hashFiles('lint/**/*.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: lint/build/reports/lint-results.sarif
          category: lint

  androidTest:
    name: Instrumentation tests
    runs-on: ubuntu-latest
    timeout-minutes: 55
    strategy:
      matrix:
        api-level: [26, 34]

    steps:
      - name: Delete unnecessary tools
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          android: false
          tool-cache: true
          dotnet: true
          haskell: true
          swap-storage: true
          docker-images: false
          large-packages: false

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy CI gradle.properties
        run: mkdir -p ~/.gradle && cp .github/ci-gradle.properties ~/.gradle/gradle.properties

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: yes

      - name: Build projects and run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          disable-animations: true
          disk-size: 6000M
          heap-size: 600M
          script: ./gradlew connectedDemoDebugAndroidTest --daemon

      - name: Upload androidTest reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: androidTest-results-api-${{ matrix.api-level }}
          path: '**/build/reports/androidTests/**'
